<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruba 💫</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at bottom, #050816, #000008);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* canvas */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* text under */
.sub {
  position: absolute;
  bottom: 12%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 22px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 5s;
}

@keyframes fadeIn {
  to { opacity: 0.9; }
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="sub">b7bk 💖</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== BACKGROUND STARS =====
let bgStars = [];
for (let i = 0; i < 200; i++) {
  bgStars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5
  });
}

// ===== SHOOTING STAR =====
let shoot = {
  x: canvas.width + 100,
  y: canvas.height * 0.2,
  vx: -8,
  vy: 3,
  active: true,
  trail: []
};

// ===== TEXT PARTICLES =====
let particles = [];
let formed = false;

function createTextParticles() {
  const temp = document.createElement("canvas");
  const tctx = temp.getContext("2d");

  temp.width = canvas.width;
  temp.height = canvas.height;

  tctx.fillStyle = "white";
  tctx.font = "bold 140px Arial";
  tctx.textAlign = "center";
  tctx.fillText("Ruba", canvas.width / 2, canvas.height / 2);

  const data = tctx.getImageData(0, 0, temp.width, temp.height);

  for (let y = 0; y < canvas.height; y += 6) {
    for (let x = 0; x < canvas.width; x += 6) {
      let i = (y * canvas.width + x) * 4;
      if (data.data[i + 3] > 128) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          tx: x,
          ty: y,
          size: Math.random() * 2 + 1.2
        });
      }
    }
  }
}

// ===== ANIMATION =====
function animate() {
  ctx.fillStyle = "rgba(0,0,10,0.35)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // background stars
  for (let s of bgStars) {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ===== SHOOTING STAR =====
  if (shoot.active) {
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 2;

    shoot.trail.push({ x: shoot.x, y: shoot.y });

    if (shoot.trail.length > 20) shoot.trail.shift();

    ctx.beginPath();
    for (let i = 0; i < shoot.trail.length; i++) {
      const p = shoot.trail[i];
      ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(shoot.x, shoot.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();

    shoot.x += shoot.vx;
    shoot.y += shoot.vy;

    // when reaches center → explode into text
    if (shoot.x < canvas.width / 2) {
      shoot.active = false;
      createTextParticles();

      setTimeout(() => {
        formed = true;
      }, 1000);
    }
  }

  // ===== PARTICLES (Ruba FORMATION) =====
  for (let p of particles) {
    if (!formed) {
      // scatter → move toward position
      p.x += (p.tx - p.x) * 0.02;
      p.y += (p.ty - p.y) * 0.02;
    } else {
      // slight twinkle motion
      p.x += Math.sin(Date.now() * 0.001 + p.tx) * 0.3;
      p.y += Math.cos(Date.now() * 0.001 + p.ty) * 0.3;
    }

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();

// resize
window.addEventListener("resize", () => {
  location.reload();
});
</script>

</body>
</html>

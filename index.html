<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>رسالة إعتذار</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Amiri&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to top, #061a44, #1e90ff, #87ceeb);
}

/* ⭐ stars */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite ease-in-out;
}

@keyframes twinkle {
  0%,100% {opacity: 0.2; transform: scale(1);}
  50% {opacity: 1; transform: scale(1.5);}
}

/* 🌙 moon */
.moon {
  position: absolute;
  top: 60px;
  right: 80px;
  width: 80px;
  height: 80px;
  background: #fdf6c3;
  border-radius: 50%;
  box-shadow: 0 0 25px rgba(255,255,200,0.8);
  transition: all 1s ease;
  z-index: 0;
}

/* 💌 card */
.card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(18px);
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  max-width: 520px;
  color: white;
}

h1 {
  font-family: 'Amiri', serif;
  color: #fff3b0;
}

.name {
  color: #ffe66d;
  font-weight: bold;
  margin-bottom: 10px;
}

.typing {
  display: inline-block;
  overflow: hidden;
  border-right: 2px solid white;
  white-space: pre-line;
  font-size: 18px;
  line-height: 1.9;
  width: 0;
  animation: typing 5s steps(120,end) forwards, blink 0.8s infinite;
}

@keyframes typing {
  from {width: 0;}
  to {width: 100%;}
}

@keyframes blink {
  50% {border-color: transparent;}
}

button {
  margin-top: 20px;
  padding: 10px 22px;
  border: none;
  border-radius: 12px;
  background: #ffe66d;
  font-weight: bold;
  cursor: pointer;
}
button:hover {background:#ffd000;}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="moon" id="moon"></div>

<div class="card">
  <h1>رسالة إعتذار 🤍</h1>
  <div class="name">To: Ruba 💗</div>

  <div class="typing">
رُبى، أنا بعتذر كتير منك يا عمري💖
    كرمال نسيت ذكرك تاخدي الدوا🥺
    انتِ بتعرفي قديه بحبك
    وسلامة قلبك يا عمررري❤️
حقك عليي 🤍  
وما كان لازم يصير هيك
    سامحيني✨
  </div>

  <button onclick="transformMoon()"> اكبسي هون</button>
</div>

<script>
const stars = document.getElementById("stars");

for (let i = 0; i < 90; i++) {
  let s = document.createElement("div");
  s.className = "star";
  s.style.top = Math.random()*100 + "%";
  s.style.left = Math.random()*100 + "%";
  s.style.animationDuration = (1 + Math.random()*3) + "s";
  stars.appendChild(s);
}

function transformMoon(){
  const moon = document.getElementById("moon");

  moon.style.background = "transparent";
  moon.style.boxShadow = "none";
  moon.style.transform = "scale(1.3) rotate(20deg)";
  moon.innerHTML = "❤️";
  moon.style.fontSize = "45px";
  moon.style.display = "flex";
  moon.style.alignItems = "center";
  moon.style.justifyContent = "center";
  moon.style.filter = "drop-shadow(0 0 15px red)";
}
</script>

</body>
</html>

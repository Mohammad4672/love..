<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💫 Secret</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at bottom, #070a1f, #000008);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
}

/* canvas stars */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* login box */
.login {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  text-align: center;
  background: rgba(255,255,255,0.06);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

input {
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  text-align: center;
  width: 200px;
  font-size: 16px;
}

button {
  margin-top: 12px;
  padding: 10px 20px;
  border: none;
  border-radius: 15px;
  background: #0a84ff;
  color: white;
  cursor: pointer;
}

/* message card */
.card {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 85%;
  max-width: 520px;
  padding: 28px;
  background: rgba(255,255,255,0.06);
  border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  text-align: center;
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%,-45%) scale(0.95); }
  to { opacity: 1; transform: translate(-50%,-50%) scale(1); }
}

.title {
  font-size: 26px;
  margin-bottom: 18px;
}

.text {
  font-size: 20px;
  line-height: 1.9;
}

.glow {
  margin-top: 18px;
  font-size: 18px;
  color: #7dd3fc;
  animation: pulse 1.8s infinite;
}

@keyframes pulse {
  0% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
  100% { opacity: 0.5; transform: scale(1); }
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- LOGIN -->
<div class="login" id="login">
  <div style="margin-bottom:12px;">🔐 Enter Password</div>
  <input id="pass" type="password" placeholder="••••••••">
  <br>
  <button onclick="check()">Unlock</button>
</div>

<!-- MESSAGE -->
<div class="card" id="card">
  <div class="title">💫 رسالة</div>

  <div class="text">
    ما في مريم… ولا في أسماء ثانية.<br><br>

    بس في شي واحد أكيد…<br>
    إنو هوي اسم زينب.<br><br>

    وإذا في شي لازم ينقال بصراحة…<br>
    فهو انو انتِ كتيرر حلوة 💙
  </div>

  <div class="glow">في عيون زينب الحلوين ✨</div>
</div>

<script>

/* PASSWORD */
function check() {
  const val = document.getElementById("pass").value.toLowerCase();

  if (val === "zaynab") {
    document.getElementById("login").style.display = "none";
    document.getElementById("card").style.display = "block";
  } else {
    alert("Wrong password ❌");
  }
}

/* STARS */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for (let i = 0; i < 220; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.6,
    d: Math.random() * 0.6
  });
}

function animate() {
  ctx.fillStyle = "rgba(0,0,10,0.4)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for (let s of stars) {
    ctx.beginPath();
    ctx.fillStyle = "white";
    ctx.globalAlpha = Math.random();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();

    s.y += s.d;
    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => location.reload());
</script>

</body>
</html>

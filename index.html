<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 Ruba</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050510;
overflow:hidden;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.hidden{
display:none;
}

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
background-position:0 0,25px 25px;
opacity:0.15;
animation:moveStars 20s linear infinite;
z-index:-1;
}

@keyframes moveStars{
from{
transform:translateY(0);
}
to{
transform:translateY(100px);
}
}

.loading{
text-align:center;
}

.loading h1{
margin-bottom:20px;
}

.bar{
width:260px;
height:12px;
background:#222;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#ff4fa3;
animation:load 3s forwards;
}

@keyframes load{
to{
width:100%;
}
}

.card{
background:#111827;
padding:30px;
border-radius:20px;
text-align:center;
width:320px;
box-shadow:0 0 25px rgba(255,255,255,0.1);
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
outline:none;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#ff4fa3;
color:white;
cursor:pointer;
font-size:16px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.hero{
text-align:center;
animation:fade 1s ease;
}

.hero h1{
font-size:65px;
margin-bottom:10px;
}

.timeline{
margin-top:30px;
width:90%;
max-width:600px;
}

.item{
background:#111827;
padding:18px;
margin:15px 0;
border-radius:15px;
transition:0.3s;
}

.item:hover{
transform:scale(1.03);
}

.envelope{
margin-top:30px;
background:white;
color:black;
padding:30px;
border-radius:20px;
max-width:500px;
animation:fade 1s ease;
line-height:2;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="stars"></div>

<div id="loading" class="loading">
<h1>Loading Your Heart... ❤️</h1>

<div class="bar">
<div class="fill"></div>
</div>
</div>

<div id="passwordPage" class="hidden">

<div class="card">

<h2>اكتبي Password قلبي ✨</h2>

<input type="password" id="password" placeholder="Password">

<button onclick="openHeart()">
Open My Heart 💖
</button>

</div>

</div>

<div id="main" class="hidden">

<div class="hero">
<h1>Ruba 🌙</h1>
<p>من أول لحظة… صار في شي مختلف ✨</p>
</div>

<div class="timeline">
<div class="item">💫 أول نظرة</div>
<div class="item">❤️ أول تعلق</div>
<div class="item">🌌 أول ضحكة</div>
<div class="item">💍 والاختيار الوحيد… إنتِ</div>
</div>

<center>
<button onclick="showLetter()">
افتحي الرسالة 💌
</button>
</center>

<div id="letter" class="hidden envelope">

<h2>Ruba ❤️</h2>

<p>
مهما صار… وجودك لحاله بيفرق 🌙<br><br>
 واجمل صدفة صارت بحياتي هي إنتِ.<br><br>
أنا معك وحدك لآخر الطريق 💖
</p>

</div>

</div>

<script>

setTimeout(()=>{

document.getElementById("loading").classList.add("hidden");

document.getElementById("passwordPage").classList.remove("hidden");

},3000);

function openHeart(){

let pass=document.getElementById("password").value;

if(pass=="1542025"){

document.getElementById("passwordPage").classList.add("hidden");

document.getElementById("main").classList.remove("hidden");

}else{

alert("Wrong Password 💔");

}

}

function showLetter(){

document.getElementById("letter").classList.remove("hidden");

}

</script>

</body>
</html>

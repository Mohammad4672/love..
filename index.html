<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ruba 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1a0033, #050010);
  font-family: Arial, sans-serif;
}

/* stars */
.star{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  animation: floatUp 6s linear infinite;
  opacity:0.8;
}

@keyframes floatUp{
  0%{transform:translateY(100vh); opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-10vh); opacity:0;}
}

/* glass card */
.card{
  width:320px;
  padding:25px;
  border-radius:25px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  box-shadow:0 0 30px rgba(255,0,150,0.3);
  text-align:center;
  color:white;
}

/* heart */
.heart{
  width:70px;
  height:70px;
  background:pink;
  margin:0 auto 15px;
  transform: rotate(-45deg);
  position:relative;
  animation:beat 1s infinite;
  box-shadow:0 0 25px pink;
}

.heart::before,
.heart::after{
  content:"";
  width:70px;
  height:70px;
  background:pink;
  border-radius:50%;
  position:absolute;
}

.heart::before{top:-35px; left:0;}
.heart::after{left:35px; top:0;}

@keyframes beat{
  0%,100%{transform:scale(1) rotate(-45deg);}
  50%{transform:scale(1.2) rotate(-45deg);}
}

/* text */
.name{
  font-size:32px;
  color:#ff4dd2;
  font-weight:bold;
  margin-top:10px;
}

.msg{
  margin-top:15px;
  font-size:14px;
  line-height:1.6;
  color:#fff;
}

.secret{
  margin-top:20px;
  padding:10px;
  border:1px solid rgba(255,255,255,0.3);
  border-radius:12px;
  font-size:13px;
  color:#ffb3ec;
}
</style>
</head>

<body>

<div class="card">
  <div class="heart"></div>
  <div class="name">Ruba</div>

  <div class="msg">رُبى انتِ مش شخص عادي  ✨<br>
    انتِ كل شي بصير حلو بوجودك بحبك كتيررر   💖
  </div>

  <div class="secret">
    secret msg: قد ما قول بحبك ما رح اقدر اوصفلك احساسي كلو  💌
  </div>
</div>

<script>
// create stars
for(let i=0;i<30;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(s);
}
</script>

</body>
</html>

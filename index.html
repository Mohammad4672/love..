<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Heart 💖</title>

<style>
body{
  margin:0;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: monospace;
  overflow:hidden;
  color:white;
}

/* container */
.container{
  position:relative;
  width:220px;
  height:220px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* heart base */
.heart{
  position:absolute;
  width:120px;
  height:120px;
  background:#ff2d55;
  transform:rotate(-45deg);
  box-shadow:0 0 40px #ff2d55;
  transition:1.5s ease;
}

/* heart halves */
.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:120px;
  height:120px;
  background:#ff2d55;
  border-radius:50%;
  transition:1.5s ease;
}

.heart::before{ top:-60px; left:0; }
.heart::after{ left:60px; top:0; }

/* OPEN ANIMATION (slow split) */
.container.open .heart::before{
  transform:translateX(-100px) rotate(-25deg);
  opacity:0.3;
}

.container.open .heart::after{
  transform:translateX(100px) rotate(25deg);
  opacity:0.3;
}

.container.open .heart{
  background:transparent;
  box-shadow:none;
}

/* typing text inside heart */
.typing{
  position:absolute;
  color:white;
  font-size:16px;
  white-space:nowrap;
  overflow:hidden;
  border-right:2px solid white;
  width:0;
  opacity:0;
}

/* typing animation */
@keyframes typing {
  from{width:0;}
  to{width:260px;}
}

.container.open .typing{
  opacity:1;
  animation:typing 3s steps(40,end) forwards;
}

/* final message */
.message{
  position:absolute;
  bottom:-80px;
  color:#ff9bb5;
  font-size:20px;
  opacity:0;
  transform:translateY(10px);
  transition:1s ease;
}

.container.open .message{
  opacity:1;
  transform:translateY(0);
}

/* hint */
.hint{
  position:absolute;
  bottom:15%;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="container" id="box" onclick="openHeart()">

  <div class="heart"></div>

  <div class="typing" id="typingText">
    opening your heart... 💖
  </div>

  <div class="message">
    انتِ احلى بنت بالدنيا بحبك كتيرررر وما رح اختار غيرك💖
  </div>

</div>

<div class="hint">click the heart 💖</div>

<script>
function openHeart(){
  document.getElementById("box").classList.add("open");
}
</script>

</body>
</html>

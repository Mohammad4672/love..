<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>رسالة إعتذار</title>

  <!-- Arabic fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Amiri&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      direction: rtl;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    }

    /* hearts */
    .heart-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      color: rgba(255,255,255,0.6);
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(100vh); opacity: 0;}
      50% {opacity: 1;}
      100% {transform: translateY(-10vh); opacity: 0;}
    }

    /* glass card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(18px);
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      max-width: 520px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      color: white;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      color: #ffd166;
      margin-bottom: 10px;
      font-family: 'Amiri', serif;
      font-size: 32px;
    }

    .name {
      font-size: 22px;
      font-weight: bold;
      color: #ffdd57;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      line-height: 1.9;
      font-family: 'Cairo', sans-serif;
    }

    /* typing effect */
    .typing {
      overflow: hidden;
      white-space: pre-line;
      border-right: 2px solid rgba(255,255,255,0.7);
      animation: typing 5s steps(120, end), blink 0.8s infinite;
    }

    @keyframes typing {
      from {width: 0;}
      to {width: 100%;}
    }

    @keyframes blink {
      50% {border-color: transparent;}
    }

    button {
      margin-top: 20px;
      padding: 10px 22px;
      border: none;
      border-radius: 12px;
      background: #ffd166;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ffb703;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<div class="heart-bg" id="hearts"></div>

<div class="card">
  <h1>رسالة إعتذار 🤍</h1>

  <div class="name">To: Ruba 🤍</div>

  <p class="typing">
رُبى، أنا بعتذر كتير من قلبي ❤️  
انو نسيت ذكرك تاخدي الدواانتِ بتعرفي 
    اديه بحبك وسلامة قلبككك يا عمري🥺

حقك عليي 🤍  
وما كان لازم يصير هيك ✨
  </p>

  <button onclick="alert('سامحيني 🤍')">اضغطي هون</button>
</div>

<script>
  const container = document.getElementById("hearts");

  for (let i = 0; i < 25; i++) {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "%";
    h.style.animationDuration = (4 + Math.random() * 4) + "s";
    h.style.fontSize = (14 + Math.random() * 22) + "px";
    container.appendChild(h);
  }
</script>

</body>
</html>

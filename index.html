<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Elena 💖</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background: radial-gradient(circle at top,#1a0033,#000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.card{
text-align:center;
padding:40px;
border-radius:20px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
box-shadow: 0 0 40px rgba(255,105,180,0.2);
position:relative;
z-index:10;
width:300px;
}

h1{
color:#ff4da6;
font-size:35px;
margin-bottom:10px;
}

.heart{
font-size:60px;
cursor:pointer;
animation:beat 1s infinite;
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.3);}
}

/* message */
.message{
margin-top:15px;
font-size:18px;
min-height:60px;
}

/* stars */
.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation: move linear infinite;
}

@keyframes move{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* floating hearts */
.heart-float{
position:absolute;
font-size:20px;
animation: floatUp 3s linear forwards;
}

@keyframes floatUp{
from{transform:translateY(0); opacity:1;}
to{transform:translateY(-200px); opacity:0;}
}
</style>
</head>

<body>

<div class="card">
<div class="heart" onclick="start()">💖</div>
<h1>Happy Birthday Elena 🎂</h1>
<div class="message" id="msg">اضغطي على القلب 💕</div>
</div>

<script>

// stars
for(let i=0;i<50;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(Math.random()*5+3)+"s";
document.body.appendChild(s);
}

// messages
const messages = [
"🎂 كل سنة وإنتِ بخير يا أجمل Elena",
"💖 وجودِك بيخلي الحياة أحلى ",
"✨ إنتِ مش بس اسم… إنتِ قصة حلوة",
"🌙 كل سنة وإنتِ متألقة مثل النجوم",
"💫 Happy Birthday to the most special girl"
];

function typeText(text, el, i=0){
if(i===0) el.innerHTML="";
if(i<text.length){
el.innerHTML += text[i];
setTimeout(()=>typeText(text,el,i+1),50);
}
}

// hearts floating
function hearts(){
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart-float";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.top="80vh";
document.body.appendChild(h);
setTimeout(()=>h.remove(),3000);
}
}

// start
function start(){
hearts();

let msg=document.getElementById("msg");
let i=0;

function next(){
if(i>=messages.length) return;
typeText(messages[i],msg);
i++;
setTimeout(next,2500);
}

next();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>اشتقتلك🥺 </title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Amiri&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  direction:rtl;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(to top,#061a44,#1e90ff,#87ceeb);
}

/* ⭐ stars */
.stars{
  position:absolute;
  width:100%;
  height:100%;
  z-index:0;
}
.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  animation:twinkle 2s infinite ease-in-out;
}
@keyframes twinkle{
  0%,100%{opacity:0.2;transform:scale(1);}
  50%{opacity:1;transform:scale(1.5);}
}

/* 🌙 moon */
.moon{
  position:absolute;
  top:60px;
  right:80px;
  width:80px;
  height:80px;
  background:#fdf6c3;
  border-radius:50%;
  box-shadow:0 0 25px rgba(255,255,200,0.8);
  z-index:0;
  transition:0.5s;
}

/* ❤️ falling hearts container */
.hearts{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  pointer-events:none;
  z-index:1;
}

.heart{
  position:absolute;
  top:-20px;
  font-size:20px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

/* 💌 card */
.card{
  position:relative;
  z-index:2;
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.3);
  backdrop-filter:blur(18px);
  padding:40px;
  border-radius:25px;
  text-align:center;
  max-width:520px;
  color:white;
}

h1{
  font-family:'Amiri',serif;
  color:#fff3b0;
}

.name{
  color:#ffe66d;
  font-weight:bold;
  margin-bottom:10px;
}

/* typing */
.message{
  font-size:18px;
  line-height:1.9;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="moon" id="moon"></div>
<div class="hearts" id="hearts"></div>

<div class="card">
  <h1>اشتقتلك 🥺</h1>
  <div class="name">To: Ruba 💗</div>

  <div class="message">
Ruba🤍
بدي خبرك انو انا كتيررر اشتقتلك✨
وكتيررر بحبكك❤️ وبعشقكك🤍 وبموت فيكِ
يا تقبريني انتِ يا احلا بنت بالدنيا كلها
بحبك لآخر يوم بحياتي❤️
  </div>

  <button onclick="dropHearts()">اضغطي هون 🤍</button>
</div>

<script>

/* ⭐ stars */
const stars=document.getElementById("stars");
for(let i=0;i<90;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(1+Math.random()*3)+"s";
  stars.appendChild(s);
}

/* ❤️ hearts from moon */
function dropHearts(){
  const container=document.getElementById("hearts");

  for(let i=0;i<20;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";

    h.style.left=(80 + Math.random()*40 - 20)+"%"; // around moon
    h.style.fontSize=(15+Math.random()*15)+"px";
    h.style.animationDuration=(2+Math.random()*2)+"s";

    container.appendChild(h);

    setTimeout(()=>h.remove(),4000);
  }
}
</script>

</body>
</html>
